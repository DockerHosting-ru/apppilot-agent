version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: "${APP_ID}-postgres"
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nextcloud-network
    restart: unless-stopped
    labels:
      - "appliku.app_id=${APP_ID}"
      - "appliku.template_id=${TEMPLATE_ID}"
      - "appliku.managed=true"
      - "appliku.service=postgres"
      - "appliku.stack_name=${STACK_NAME}"
      - "appliku.main_service=false"

  nextcloud:
    image: nextcloud:latest
    container_name: "${APP_ID}-nextcloud"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud_secure_password
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin123
      NEXTCLOUD_TRUSTED_DOMAINS: "${SERVER_IP}:${EXTERNAL_PORT}"
    ports:
      - "${EXTERNAL_PORT}:80"
    depends_on:
      - postgres
    volumes:
      - nextcloud_data:/var/www/html
    networks:
      - nextcloud-network
    restart: unless-stopped
    labels:
      - "appliku.app_id=${APP_ID}"
      - "appliku.template_id=${TEMPLATE_ID}"
      - "appliku.managed=true"
      - "appliku.service=nextcloud"
      - "appliku.stack_name=${STACK_NAME}"
      - "appliku.main_service=true"

volumes:
  postgres_data:
    driver: local
  nextcloud_data:
    driver: local

networks:
  nextcloud-network:
    driver: bridge
