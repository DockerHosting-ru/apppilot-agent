version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: appliku-${APPLIKU_APP_ID}-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appliku-${APPLIKU_APP_ID}-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - appliku.app_id=${APPLIKU_APP_ID}
      - appliku.template_id=100
      - appliku.managed=true

  n8n:
    image: n8nio/n8n:latest
    container_name: appliku-${APPLIKU_APP_ID}-n8n
    restart: unless-stopped
    ports:
      - "${APPLIKU_MAIN_PORT}:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:${APPLIKU_MAIN_PORT}/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - appliku-${APPLIKU_APP_ID}-network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - appliku.app_id=${APPLIKU_APP_ID}
      - appliku.template_id=100
      - appliku.managed=true
      - appliku.main_service=true

volumes:
  postgres_data:
    name: appliku-${APPLIKU_APP_ID}-postgres-data
  n8n_data:
    name: appliku-${APPLIKU_APP_ID}-n8n-data

networks:
  appliku-${APPLIKU_APP_ID}-network:
    name: appliku-${APPLIKU_APP_ID}-network
    driver: bridge
